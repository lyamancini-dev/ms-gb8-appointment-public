- name: "Deploy Hospital App to Production"
  hosts: hospital-prod
  become: yes
  vars:
    project_root: /opt/hospital
    app_user: deploy
  tasks:
    # 1. Генерация .env файла из шаблона (используем ваши секреты из Vault)
    - name: Generate .env file from template
      template:
        src: templates/env.j2
        dest: "{{ project_root }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0600'

    # 2. Копирование папки со скриптами инициализации (регистр строчный: docker)
    - name: Copy SQL initialization scripts
      copy:
        src: ../docker/
        dest: "{{ project_root }}/docker/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    # 3. Копирование основного файла конфигурации Docker Compose
    - name: Copy production docker-compose.yml
      copy:
        src: ../docker-compose.yml
        dest: "{{ project_root }}/docker-compose.yml"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"

    # 4. Обновление образов и перезапуск контейнеров
    - name: Pull latest images and restart services
      shell: |
        docker compose pull
        docker compose up -d --remove-orphans
      args:
        chdir: "{{ project_root }}"
      register: deploy_status

    - name: Show Deployment Status
      debug:
        var: deploy_status.stdout_lines