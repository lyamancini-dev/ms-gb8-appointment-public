---
- name: "Base System Setup: Users, Docker, Network"
  hosts: nodes
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install dependencies for Docker
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker Engine and Plugins
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure Docker is started and enabled
      service:
        name: docker
        state: started
        enabled: yes

    - name: Setup /etc/hosts for internal resolution
      blockinfile:
        path: /etc/hosts
        block: |
          192.168.1.17 hospital-prod
          192.168.1.19 hospital-dev
          192.168.1.14 hospital-cicd
        marker: "# {mark} ANSIBLE MANAGED HOSTS"

    - name: Install useful CLI tools
      apt:
        name:
          - htop
          - git
          - ufw
        state: present

    - name: Basic Firewall - Allow SSH
      ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny
