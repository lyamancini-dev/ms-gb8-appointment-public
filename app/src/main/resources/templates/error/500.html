<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Ошибка</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container text-center mt-5">
  <div class="alert alert-danger">
    <h1 class="display-4">Ошибка <span th:text="${status}">500</span></h1>
    <p class="lead" th:text="${error}">Произошла непредвиденная ошибка</p>
    <hr class="my-4">
    <p th:text="${message}">Подробности ошибки...</p>
    <a class="btn btn-primary" href="/" role="button">Вернуться на главную</a>
  </div>
</div>

</body>
</html>
