<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

<header th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">

            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <!-- Пункт 1: Расписание (для работы с пациентами) -->
                    <li class="nav-item">
                        <a class="nav-link" href="/">Главная</a>
                    </li>
                    <!-- Пункт 2: Админ-панель (для настроек) -->
                    <li class="nav-item">
                        <a class="nav-link" href="/admin">Админ-панель</a>
                    </li>
                </ul>

                <!-- Корзина -->
                <a href="/cart" class="btn btn-light position-relative">
                    Корзина
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                          th:if="${sessionCartSize != null and sessionCartSize > 0}"
                          th:text="${sessionCartSize}">
                        0
                    </span>
                </a>
            </div>
        </div>
    </nav>
        <!-- БЛОК СООБЩЕНИЙ (Вынесен из навбара) -->
        <div class="container" style="position: relative; z-index: 1050;">
            <div th:if="${successMessage}"
                 class="alert alert-success alert-dismissible fade show position-fixed top-0 start-50 translate-middle-x mt-2"
                 role="alert" style="width: auto; max-width: 500px;">
                <span th:text="${successMessage}">Сообщение</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</header>


</body>
</html>
