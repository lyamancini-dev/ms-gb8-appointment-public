<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Результаты поиска</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<!-- Подключаем шапку -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">
    <h2>Результаты поиска: <span th:text="${query}">запрос</span></h2>
    <a href="/" class="btn btn-secondary mb-3">← На главную</a>

    <div th:if="${results.isEmpty()}" class="alert alert-warning">
        Ничего не найдено.
    </div>

    <table th:unless="${results.isEmpty()}" class="table table-striped bg-white">
        <thead>
        <tr>
            <th>Дата/Время</th>
            <th>Кабинет</th>
            <th>Пациент</th>
            <th>Телефон</th>
            <th>Оплата</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="app : ${results}">
            <td th:text="${app.startTime}">Дата</td>
            <td th:text="${app.cabinet.name}">КТ</td>
            <td th:text="${app.patient.fullName}">Пациент</td>
            <td th:text="${app.patient.phone}">Телефон</td>
            <td th:text="${app.quota ? 'Бесплатно' : 'Платно'}">Оплата</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
