<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление записями</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">
    <h2>Журнал записей (Заказы)</h2>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Дата/Время</th>
            <th>Кабинет</th>
            <th>Пациент</th>
            <th>Статус</th>
            <th>Действие</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="app : ${appointments}">
            <td th:text="${app.startTime}">...</td>
            <td th:text="${app.cabinet.name}">КТ</td>
            <td>
                <span th:if="${app.patient != null}" th:text="${app.patient.fullName}">Имя</span>
                <span th:if="${app.patient != null}" th:text="${app.patient.email}">email</span>
            </td>
            <td>
                <!-- Форма смены статуса -->
                <form th:action="@{/admin/appointments/status}" method="post" class="d-flex">
                    <input type="hidden" name="id" th:value="${app.id}">
                    <select name="status" class="form-select form-select-sm me-2">
                        <option th:each="s : ${T(com.example.medical.model.AppointmentStatus).values()}"
                                th:value="${s}"
                                th:text="${s.displayName}"
                                th:selected="${s == app.status}">
                        </option>
                    </select>
                    <button type="submit" class="btn btn-sm btn-outline-primary">OK</button>
                </form>
            </td>
            <td>
                <a th:href="@{/edit/{id}(id=${app.id})}" class="btn btn-sm btn-info">Детали</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
