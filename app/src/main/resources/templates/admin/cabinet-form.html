<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Новый кабинет</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">
  <h2>Создание/Редактирование кабинета</h2>

  <div class="card">
    <div class="card-body">
      <form th:action="@{/admin/cabinets/save}" th:object="${cabinet}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
          <label class="form-label">Название (например, МРТ, УЗИ)</label>
          <input type="text" th:field="*{name}" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Номер кабинета</label>
          <input type="text" th:field="*{roomNumber}" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Шаг записи (в минутах)</label>
          <input type="number" th:field="*{defaultSlotMinutes}" class="form-control" required>
          <div class="form-text">Например: 15, 20 или 30 минут.</div>
        </div>

        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="/admin/cabinets" class="btn btn-link">Отмена</a>
      </form>
    </div>
  </div>
</div>

</body>
</html>
