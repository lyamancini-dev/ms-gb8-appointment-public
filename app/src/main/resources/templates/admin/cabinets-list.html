<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление кабинетами</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Управление кабинетами</h2>
        <a href="/admin/cabinets/new" class="btn btn-success">+ Добавить кабинет</a>
    </div>

    <table class="table table-bordered bg-white">
        <thead>
        <tr>
            <th>Название</th>
            <th>Номер кабинета</th>
            <th>Шаг записи (мин)</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cab : ${cabinets}">
            <td th:text="${cab.name}">КТ</td>
            <td th:text="${cab.roomNumber}">140</td>
            <td th:text="${cab.defaultSlotMinutes}">15</td>
            <td>
                <!-- ИСПРАВЛЕНО: метод POST вместо GET -->
                <form th:action="@{/admin/cabinets/delete/{id}(id=${cab.id})}" method="post"
                      style="display: inline;"
                      onsubmit="return confirm('Удалить кабинет? Это удалит и все записи в нем!')">
                    <button type="submit" class="btn btn-sm btn-danger">Удалить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">← На главную</a>
</div>

</body>
</html>
