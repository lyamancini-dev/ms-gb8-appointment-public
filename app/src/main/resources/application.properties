spring.application.name=medical

# --- Настройки подключения к PostgreSQL ---
# Мы используем переменные ${...}, чтобы Docker мог подставить нужные адреса
spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:5432/${DB_NAME:hospital_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-className=org.postgresql.Driver

# --- Настройки JPA / Hibernate ---
# update — автоматически создаст таблицы в Postgres при первом запуске
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- Настройки обработки ошибок (твои текущие) ---
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# --- Дополнительно ---
spring.thymeleaf.cache=false
spring.jpa.open-in-view=false