version: "3"

services:
  server:
    image: gitea/gitea:1.21
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3 
      - GITEA__server__ROOT_URL=http://10.6.1.14:3000/ 
    restart: always
    volumes:
      - ./data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000" # Веб-интерфейс
      - "2222:22"   

  runner:
    image: gitea/act_runner:latest
    container_name: gitea-runner
    restart: always
    depends_on:
      - server
    volumes:
      - ./runner-data:/data
      - /var/run/docker.sock:/var/run/docker.sock 
    environment:
      - CONFIG_FILE=/data/config.yaml
      - GITEA_INSTANCE_URL=http://10.6.1.14:3000/
      - GITEA_RUNNER_REGISTRATION_TOKEN=UU3O3DjdilPwx3LQ5OfDdubWuHfJC0nW06DJZuIR